document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  --navy:#1f3a5f;\n    --navy-deep:#15293f;\n    --navy-soft:#2b5384;\n    --line:#7d92aa;\n    --line-strong:#1f3a5f;\n    --bg:#eaeef3;\n    --bg-2:#dfe5ed;\n    --card:#ffffff;\n    --card-border:#ccd6e2;\n    --text:#1f3a5f;\n    --muted:#65789021;\n    --shadow:0 1px 2px rgba(21,41,63,.06), 0 6px 18px rgba(21,41,63,.08);\n    --shadow-hi:0 2px 6px rgba(21,41,63,.12), 0 14px 34px rgba(21,41,63,.18);\n  }\n  *{box-sizing:border-box;margin:0;padding:0;}\n  html,body{height:100%;}\n  body{\n    font-family:\"Noto Naskh Arabic\", serif;\n    color:var(--text);\n    background:var(--bg);\n    overflow:hidden;\n    -webkit-font-smoothing:antialiased;\n  }\n\n  /* ---------- Toolbar ---------- */\n  .toolbar{\n    position:fixed; top:0; left:0; right:0; z-index:30;\n    height:64px;\n    display:flex; align-items:center; justify-content:space-between;\n    padding:0 22px;\n    background:rgba(244,247,250,.86);\n    backdrop-filter:blur(10px);\n    border-bottom:1px solid #d3dbe5;\n  }\n  .brand{display:flex; align-items:center; gap:14px;}\n  .brand .mark{\n    width:34px;height:34px;border-radius:9px;\n    background:var(--navy); position:relative; flex:0 0 auto;\n    box-shadow:var(--shadow);\n  }\n  .brand .mark::before,.brand .mark::after{\n    content:\"\";position:absolute;background:#fff;border-radius:1px;\n  }\n  .brand .mark::before{top:9px;left:9px;right:9px;height:3px;}\n  .brand .mark::after{top:15px;left:9px;right:9px;height:3px;box-shadow:0 6px 0 #fff;}\n  .brand h1{font-family:\"Noto Kufi Arabic\",sans-serif;font-size:19px;font-weight:700;letter-spacing:.2px;}\n  .brand .sub{font-family:\"Noto Kufi Arabic\",sans-serif;font-size:11.5px;color:#6c7d92;font-weight:400;margin-top:1px;}\n\n  .controls{display:flex; align-items:center; gap:8px;}\n  .group{display:flex; align-items:center; gap:2px; background:#fff; border:1px solid #d3dbe5; border-radius:11px; padding:3px; box-shadow:var(--shadow);}\n  .btn{\n    font-family:\"Noto Kufi Arabic\",sans-serif;\n    border:none; background:transparent; color:var(--navy);\n    font-size:13px; font-weight:500;\n    padding:7px 12px; border-radius:8px; cursor:pointer;\n    display:flex;align-items:center;gap:7px; white-space:nowrap;\n    transition:background .15s, color .15s;\n  }\n  .btn:hover{background:#eef2f7;}\n  .btn.icon{padding:7px 9px; min-width:34px; justify-content:center;}\n  .btn.active{background:var(--navy); color:#fff;}\n  .btn svg{width:16px;height:16px;display:block;}\n  .sep{width:1px;height:22px;background:#dde3ec;margin:0 2px;}\n\n  /* ---------- Stage ---------- */\n  .stage{\n    position:fixed; inset:64px 0 0 0;\n    overflow:hidden; cursor:grab;\n    background:\n      radial-gradient(circle at center, #f1f4f8 0%, var(--bg) 70%, var(--bg-2) 100%);\n  }\n  .stage::before{\n    content:\"\"; position:absolute; inset:-2000px;\n    background-image:radial-gradient(rgba(31,58,95,.10) 1.2px, transparent 1.2px);\n    background-size:26px 26px;\n    pointer-events:none;\n  }\n  .stage.grabbing{cursor:grabbing;}\n  #viewport{position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform;}\n\n  svg.links{position:absolute; top:0; left:0; overflow:visible; pointer-events:none;}\n  svg.links path{\n    fill:none; stroke:var(--line); stroke-width:1.6;\n    stroke-linejoin:round; stroke-linecap:round;\n    transition:stroke .18s, stroke-width .18s, opacity .18s;\n  }\n  svg.links path.hl{stroke:var(--line-strong); stroke-width:2.6;}\n  svg.links.dim path:not(.hl){opacity:.32;}\n\n  /* ---------- Nodes ---------- */\n  .node{\n    position:absolute; top:0; left:0;\n    width:220px; min-height:70px;\n    background:var(--card);\n    border:1px solid var(--card-border);\n    border-radius:14px;\n    box-shadow:var(--shadow);\n    display:flex; align-items:center; justify-content:center;\n    text-align:center;\n    padding:12px 16px;\n    cursor:default;\n    transition:transform .42s cubic-bezier(.4,.0,.15,1), box-shadow .2s, border-color .2s, opacity .3s;\n    will-change:transform;\n  }\n  .node .label{\n    font-size:15px; line-height:1.34; font-weight:600;\n    color:var(--navy); letter-spacing:.1px;\n    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;\n  }\n  /* root emphasis */\n  .node.root{\n    background:linear-gradient(180deg,var(--navy) 0%, var(--navy-deep) 100%);\n    border-color:var(--navy-deep);\n    min-height:76px;\n    box-shadow:0 2px 6px rgba(21,41,63,.18), 0 16px 36px rgba(21,41,63,.26);\n  }\n  .node.root .label{color:#fff; font-size:16px; font-weight:700;}\n  .node.root::before{\n    content:\"\"; position:absolute; inset:4px; border:1px solid rgba(255,255,255,.16); border-radius:10px; pointer-events:none;\n  }\n\n  .node:hover{border-color:var(--navy); box-shadow:var(--shadow-hi); transform:translate(var(--tx),var(--ty)) translateY(-2px)!important;}\n  .node.root:hover{transform:translate(var(--tx),var(--ty)) translateY(-2px)!important;}\n  .node.onpath{border-color:var(--navy-soft); box-shadow:var(--shadow-hi);}\n  .node.faded{opacity:.45;}\n  .node.hidden{display:none;}\n\n  /* collapse toggle */\n  .toggle{\n    position:absolute; z-index:5;\n    width:24px;height:24px;border-radius:50%;\n    background:#fff; border:1.6px solid var(--navy);\n    color:var(--navy); cursor:pointer;\n    display:flex;align-items:center;justify-content:center;\n    font-family:\"Noto Kufi Arabic\",sans-serif; font-weight:700; font-size:15px; line-height:1;\n    box-shadow:0 2px 5px rgba(21,41,63,.18);\n    transition:background .15s,color .15s,transform .15s;\n    padding:0;\n  }\n  .toggle:hover{background:var(--navy); color:#fff; transform:scale(1.12);}\n  .toggle .ico{display:block;transform:translateY(-1px);}\n  /* placement set per orientation */\n  .orient-v .toggle{bottom:-12px; left:50%; transform:translateX(-50%);}\n  .orient-v .toggle:hover{transform:translateX(-50%) scale(1.12);}\n  .orient-h .toggle{left:-12px; top:50%; transform:translateY(-50%);}\n  .orient-h .toggle:hover{transform:translateY(-50%) scale(1.12);}\n  .toggle.collapsed{background:var(--navy); color:#fff;}\n\n  /* count badge for collapsed branch */\n  .badge{\n    position:absolute; z-index:4;\n    background:var(--navy-soft); color:#fff;\n    font-family:\"Noto Kufi Arabic\",sans-serif; font-size:10.5px; font-weight:700;\n    border-radius:999px; padding:1px 7px; line-height:1.5;\n    box-shadow:0 1px 3px rgba(21,41,63,.25); white-space:nowrap;\n    opacity:0; transition:opacity .2s;\n  }\n  .orient-v .badge{bottom:-30px; left:50%; transform:translateX(-50%);}\n  .orient-h .badge{left:-44px; top:50%; transform:translate(-50%,-50%);}\n  .node.is-collapsed .badge{opacity:1;}\n\n  /* ---------- Footer hint ---------- */\n  .hint{\n    position:fixed; bottom:16px; right:22px; z-index:20;\n    font-family:\"Noto Kufi Arabic\",sans-serif; font-size:11.5px; color:#7e8ea1;\n    background:rgba(255,255,255,.7); border:1px solid #dbe2ea;\n    padding:7px 13px; border-radius:9px; backdrop-filter:blur(6px);\n    display:flex; gap:14px; pointer-events:none;\n  }\n  .hint b{color:var(--navy); font-weight:700;}\n\n  .zoom-label{\n    font-family:\"Noto Kufi Arabic\",sans-serif; font-size:12px; color:#6c7d92; font-weight:500;\n    min-width:42px; text-align:center;\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <div class=\"toolbar\">\n    <div class=\"brand\">\n      <div class=\"mark\"><\u002Fdiv>\n      <div>\n        <h1>الهيكل التنظيمي<\u002Fh1>\n        <div class=\"sub\">Organizational Structure<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"controls\">\n      <div class=\"group\" role=\"group\" aria-label=\"الاتجاه\">\n        <button class=\"btn\" id=\"btn-v\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"9\" y=\"3\" width=\"6\" height=\"5\" rx=\"1.2\"><\u002Frect><rect x=\"3\" y=\"16\" width=\"6\" height=\"5\" rx=\"1.2\"><\u002Frect><rect x=\"15\" y=\"16\" width=\"6\" height=\"5\" rx=\"1.2\"><\u002Frect><path d=\"M12 8v4M6 16v-2h12v2\"><\u002Fpath><\u002Fsvg>\n          عمودي\n        <\u002Fbutton>\n        <button class=\"btn\" id=\"btn-h\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><rect x=\"16\" y=\"9\" width=\"5\" height=\"6\" rx=\"1.2\"><\u002Frect><rect x=\"3\" y=\"3\" width=\"5\" height=\"6\" rx=\"1.2\"><\u002Frect><rect x=\"3\" y=\"15\" width=\"5\" height=\"6\" rx=\"1.2\"><\u002Frect><path d=\"M16 12h-4M8 6v12h-2\"><\u002Fpath><\u002Fsvg>\n          أفقي\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"group\">\n        <button class=\"btn\" id=\"btn-expand\">توسيع الكل<\u002Fbutton>\n        <div class=\"sep\"><\u002Fdiv>\n        <button class=\"btn\" id=\"btn-collapse\">طيّ الكل<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"group\">\n        <button class=\"btn icon\" id=\"btn-zout\" aria-label=\"تصغير\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <span class=\"zoom-label\" id=\"zoom-label\">100%<\u002Fspan>\n        <button class=\"btn icon\" id=\"btn-zin\" aria-label=\"تكبير\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <div class=\"sep\"><\u002Fdiv>\n        <button class=\"btn icon\" id=\"btn-fit\" aria-label=\"ملاءمة\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"stage\" id=\"stage\">\n    <div id=\"viewport\">\n      <svg class=\"links\" id=\"links\"><\u002Fsvg>\n      <div id=\"nodes\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hint\">\n    <span><b>اسحب<\u002Fb> للتحريك<\u002Fspan>\n    <span><b>عجلة الفأرة<\u002Fb> للتكبير<\u002Fspan>\n    <span><b>+ / −<\u002Fb> لطيّ الفروع<\u002Fspan>\n  <\u002Fdiv>\n\n<script>\n(function(){\n  \"use strict\";\n\n  /* ===================== Unified hierarchy ===================== */\n  const TREE = {\n    id:\"ceo\", label:\"مجلس الإدارة / الرئيس التنفيذي\", children:[\n      { id:\"vp_research\", label:\"مكتب نائب الرئيس للبحث العلمي والابتكار\" },\n      { id:\"vp_admin\", label:\"مكتب نائب الرئيس للشؤون الإدارية والمالية\", children:[\n        { id:\"projects\", label:\"إدارة المشاريع\" }\n      ]},\n      { id:\"hr\", label:\"إدارة الموارد البشرية والشؤون الإدارية\" },\n      { id:\"bizdev\", label:\"تطوير الأعمال\", children:[\n        { id:\"planning\", label:\"التخطيط والجودة\" }\n      ]},\n      { id:\"tech\", label:\"الإدارة التنفيذية للتكنولوجيا\", children:[\n        { id:\"it\", label:\"إدارة تقنية المعلومات\", children:[\n          { id:\"digital\", label:\"التحول الرقمي\", children:[\n            { id:\"ea\", label:\"مكتب البنية المؤسسية\" }\n          ]}\n        ]},\n        { id:\"rnd\", label:\"البحث والتطوير\", children:[\n          { id:\"risk\", label:\"إدارة المخاطر\" }\n        ]}\n      ]}\n    ]\n  };\n\n  /* ===================== Geometry constants ===================== */\n  const NODE_W = 220, NODE_H = 74;\n  const H_GAP = 28, V_GAP = 78;      // vertical mode (top-down)\n  const ROW_GAP = 22, COL_GAP = 86;  // horizontal mode (RTL)\n  const PAD = 80;\n\n  /* ===================== State ===================== */\n  const SKEY = \"orgchart_state_v1\";\n  let state = { orient:\"v\", collapsed:[], zoom:1, panX:0, panY:0 };\n  try{ const s = JSON.parse(localStorage.getItem(SKEY)); if(s && typeof s===\"object\") state = Object.assign(state, s); }catch(e){}\n  const collapsed = new Set(state.collapsed || []);\n\n  /* ===================== Index nodes & parents ===================== */\n  const byId = {}, parentOf = {}, descCount = {};\n  (function index(n,p){\n    byId[n.id]=n; parentOf[n.id]= p?p.id:null;\n    (n.children||[]).forEach(c=>index(c,n));\n  })(TREE,null);\n  (function count(n){\n    let total=0;\n    (n.children||[]).forEach(c=>{ total += 1 + count(c); });\n    descCount[n.id]=total; return total;\n  })(TREE);\n\n  /* ===================== DOM ===================== */\n  const stage = document.getElementById(\"stage\");\n  const viewport = document.getElementById(\"viewport\");\n  const nodesLayer = document.getElementById(\"nodes\");\n  const svg = document.getElementById(\"links\");\n  const nodeEls = {};\n\n  // build node elements once\n  Object.values(byId).forEach(n=>{\n    const el = document.createElement(\"div\");\n    el.className = \"node\" + (n.id===\"ceo\" ? \" root\":\"\");\n    el.dataset.id = n.id;\n    const lab = document.createElement(\"div\");\n    lab.className=\"label\"; lab.textContent = n.label;\n    el.appendChild(lab);\n    if(n.children && n.children.length){\n      const tg = document.createElement(\"button\");\n      tg.className=\"toggle\"; tg.setAttribute(\"aria-label\",\"طيّ/توسيع\");\n      tg.innerHTML = '<span class=\"ico\"><\u002Fspan>';\n      tg.addEventListener(\"click\",(e)=>{ e.stopPropagation(); toggleNode(n.id); });\n      el.appendChild(tg);\n      const bd = document.createElement(\"div\");\n      bd.className=\"badge\";\n      el.appendChild(bd);\n    }\n    el.addEventListener(\"mouseenter\",()=>highlight(n.id,true));\n    el.addEventListener(\"mouseleave\",()=>highlight(n.id,false));\n    nodeEls[n.id]=el;\n    nodesLayer.appendChild(el);\n  });\n\n  /* ===================== Layout ===================== */\n  function computeLayout(orient){\n    const pos = {}; let cursor = 0; let maxDepth = 0;\n    (function walk(n,depth){\n      maxDepth = Math.max(maxDepth, depth);\n      const kids = (!collapsed.has(n.id) && n.children) ? n.children : [];\n      if(kids.length===0){\n        pos[n.id] = { lead: cursor, depth };\n        cursor++;\n      } else {\n        kids.forEach(k=>walk(k,depth+1));\n        const f = pos[kids[0].id].lead, l = pos[kids[kids.length-1].id].lead;\n        pos[n.id] = { lead:(f+l)/2, depth };\n      }\n    })(TREE,0);\n\n    const coords = {};\n    Object.keys(pos).forEach(id=>{\n      const p = pos[id];\n      if(orient===\"v\"){\n        coords[id] = { x: p.lead*(NODE_W+H_GAP), y: p.depth*(NODE_H+V_GAP) };\n      } else {\n        coords[id] = { x: (maxDepth-p.depth)*(NODE_W+COL_GAP), y: p.lead*(NODE_H+ROW_GAP) };\n      }\n    });\n    if(orient===\"v\"){ // mirror for RTL: first child on the right\n      let mx=0; Object.values(coords).forEach(c=>mx=Math.max(mx,c.x));\n      Object.values(coords).forEach(c=> c.x = mx - c.x );\n    }\n    // normalise to PAD origin and get bounds\n    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;\n    Object.values(coords).forEach(c=>{ minX=Math.min(minX,c.x);minY=Math.min(minY,c.y);maxX=Math.max(maxX,c.x);maxY=Math.max(maxY,c.y); });\n    Object.values(coords).forEach(c=>{ c.x = c.x - minX + PAD; c.y = c.y - minY + PAD; });\n    const sceneW = (maxX-minX) + NODE_W + PAD*2;\n    const sceneH = (maxY-minY) + NODE_H + PAD*2;\n    return { coords, sceneW, sceneH };\n  }\n\n  /* ===================== Render ===================== */\n  let layout = null;\n\n  function visibleSet(){\n    const vis = new Set();\n    (function walk(n){\n      vis.add(n.id);\n      if(!collapsed.has(n.id)) (n.children||[]).forEach(walk);\n    })(TREE);\n    return vis;\n  }\n\n  function rounded(pts, r){\n    if(pts.length<2) return \"\";\n    let d = `M ${pts[0][0]} ${pts[0][1]}`;\n    for(let i=1;i<pts.length-1;i++){\n      const a=pts[i-1], b=pts[i], c=pts[i+1];\n      const len1=Math.hypot(b[0]-a[0],b[1]-a[1]), len2=Math.hypot(c[0]-b[0],c[1]-b[1]);\n      const rr=Math.min(r, len1/2, len2/2);\n      const u1=[(b[0]-a[0])/(len1||1),(b[1]-a[1])/(len1||1)];\n      const u2=[(c[0]-b[0])/(len2||1),(c[1]-b[1])/(len2||1)];\n      const p1=[b[0]-u1[0]*rr, b[1]-u1[1]*rr];\n      const p2=[b[0]+u2[0]*rr, b[1]+u2[1]*rr];\n      d += ` L ${p1[0].toFixed(1)} ${p1[1].toFixed(1)} Q ${b[0]} ${b[1]} ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;\n    }\n    const e=pts[pts.length-1];\n    d += ` L ${e[0]} ${e[1]}`;\n    return d;\n  }\n\n  function render(animate){\n    const orient = state.orient;\n    layout = computeLayout(orient);\n    const { coords, sceneW, sceneH } = layout;\n    const vis = visibleSet();\n\n    viewport.style.width = sceneW+\"px\";\n    viewport.style.height = sceneH+\"px\";\n    svg.setAttribute(\"width\", sceneW);\n    svg.setAttribute(\"height\", sceneH);\n    svg.setAttribute(\"viewBox\", `0 0 ${sceneW} ${sceneH}`);\n\n    // edges\n    let paths = \"\";\n    Object.values(byId).forEach(n=>{\n      if(!vis.has(n.id) || collapsed.has(n.id) || !n.children) return;\n      const p = coords[n.id]; if(!p) return;\n      n.children.forEach(ch=>{\n        if(!coords[ch.id]) return;\n        const c = coords[ch.id];\n        const pcx=p.x+NODE_W/2, pcy=p.y+NODE_H/2;\n        const ccx=c.x+NODE_W/2, ccy=c.y+NODE_H/2;\n        let pts;\n        if(orient===\"v\"){\n          const py2=p.y+NODE_H, cy0=c.y, mid=(py2+cy0)/2;\n          pts=[[pcx,py2],[pcx,mid],[ccx,mid],[ccx,cy0]];\n        } else {\n          // RTL: parent exits its left edge, child enters its right edge\n          const px0=p.x, crx=c.x+NODE_W, mid=(px0+crx)/2;\n          pts=[[px0,pcy],[mid,pcy],[mid,ccy],[crx,ccy]];\n        }\n        paths += `<path data-edge=\"${ch.id}\" d=\"${rounded(pts, 14)}\"><\u002Fpath>`;\n      });\n    });\n    svg.innerHTML = paths;\n\n    // nodes\n    stage.classList.toggle(\"orient-v\", orient===\"v\");\n    stage.classList.toggle(\"orient-h\", orient===\"h\");\n    Object.values(byId).forEach(n=>{\n      const el = nodeEls[n.id];\n      if(!vis.has(n.id)){ el.classList.add(\"hidden\"); return; }\n      el.classList.remove(\"hidden\");\n      const c = coords[n.id];\n      el.style.setProperty(\"--tx\", c.x+\"px\");\n      el.style.setProperty(\"--ty\", c.y+\"px\");\n      if(!animate){ const t=el.style.transition; el.style.transition=\"none\"; el.style.transform=`translate(${c.x}px,${c.y}px)`; void el.offsetWidth; el.style.transition=t; }\n      else el.style.transform=`translate(${c.x}px,${c.y}px)`;\n      // toggle state\n      const isC = collapsed.has(n.id);\n      el.classList.toggle(\"is-collapsed\", isC && !!(n.children&&n.children.length));\n      const tg = el.querySelector(\".toggle\");\n      if(tg){\n        tg.classList.toggle(\"collapsed\", isC);\n        tg.querySelector(\".ico\").textContent = isC ? \"+\" : \"−\";\n      }\n      const bd = el.querySelector(\".badge\");\n      if(bd) bd.textContent = isC ? (descCount[n.id] + \" وحدة\") : \"\";\n    });\n  }\n\n  /* ===================== Highlight path-to-root ===================== */\n  function ancestorChain(id){\n    const chain=[]; let cur=id;\n    while(cur){ chain.push(cur); cur=parentOf[cur]; }\n    return chain; // [self ... root]\n  }\n  function highlight(id, on){\n    const chain = ancestorChain(id);\n    const set = new Set(chain);\n    svg.classList.toggle(\"dim\", on);\n    // edges along chain: edge keyed by child id\n    chain.forEach(cid=>{\n      const pth = svg.querySelector(`path[data-edge=\"${cid}\"]`);\n      if(pth) pth.classList.toggle(\"hl\", on);\n    });\n    Object.values(byId).forEach(n=>{\n      const el=nodeEls[n.id];\n      if(on){\n        el.classList.toggle(\"onpath\", set.has(n.id) && n.id!==id);\n        el.classList.toggle(\"faded\", !set.has(n.id));\n      } else {\n        el.classList.remove(\"onpath\",\"faded\");\n      }\n    });\n  }\n\n  /* ===================== Interactions ===================== */\n  function toggleNode(id){\n    if(collapsed.has(id)) collapsed.delete(id); else collapsed.add(id);\n    persist(); render(true);\n  }\n  function setOrient(o){\n    if(state.orient===o) return;\n    state.orient=o; updateOrientBtns();\n    render(false); fit(); persist();\n  }\n  function updateOrientBtns(){\n    document.getElementById(\"btn-v\").classList.toggle(\"active\", state.orient===\"v\");\n    document.getElementById(\"btn-h\").classList.toggle(\"active\", state.orient===\"h\");\n  }\n  function expandAll(){ collapsed.clear(); persist(); render(true); }\n  function collapseAllToLevel(){\n    // collapse everything that has children except the root\n    collapsed.clear();\n    Object.values(byId).forEach(n=>{ if(n.id!==\"ceo\" && n.children && n.children.length) collapsed.add(n.id); });\n    persist(); render(true); fit();\n  }\n\n  /* ===================== Zoom & Pan ===================== */\n  function applyTransform(){\n    viewport.style.transform = `translate(${state.panX}px,${state.panY}px) scale(${state.zoom})`;\n    document.getElementById(\"zoom-label\").textContent = Math.round(state.zoom*100)+\"%\";\n  }\n  function clampZoom(z){ return Math.max(.3, Math.min(2.2, z)); }\n  function zoomAt(cx, cy, factor){\n    const z2 = clampZoom(state.zoom*factor);\n    const f = z2/state.zoom;\n    state.panX = cx - (cx - state.panX)*f;\n    state.panY = cy - (cy - state.panY)*f;\n    state.zoom = z2; applyTransform(); persist();\n  }\n  function fit(){\n    if(!layout) return;\n    const r = stage.getBoundingClientRect();\n    const z = clampZoom(Math.min(r.width/layout.sceneW, r.height/layout.sceneH) * 0.94);\n    state.zoom = z;\n    state.panX = (r.width - layout.sceneW*z)/2;\n    state.panY = (r.height - layout.sceneH*z)/2;\n    applyTransform(); persist();\n  }\n\n  // drag to pan\n  let dragging=false, sx=0, sy=0, ox=0, oy=0, moved=false;\n  stage.addEventListener(\"mousedown\",(e)=>{\n    if(e.target.closest(\".node\")) return;\n    dragging=true; moved=false; sx=e.clientX; sy=e.clientY; ox=state.panX; oy=state.panY;\n    stage.classList.add(\"grabbing\");\n  });\n  window.addEventListener(\"mousemove\",(e)=>{\n    if(!dragging) return;\n    state.panX = ox + (e.clientX-sx); state.panY = oy + (e.clientY-sy);\n    if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>3) moved=true;\n    applyTransform();\n  });\n  window.addEventListener(\"mouseup\",()=>{ if(dragging){dragging=false; stage.classList.remove(\"grabbing\"); persist();} });\n  stage.addEventListener(\"wheel\",(e)=>{\n    e.preventDefault();\n    const r=stage.getBoundingClientRect();\n    zoomAt(e.clientX-r.left, e.clientY-r.top, e.deltaY<0?1.12:0.89);\n  },{passive:false});\n\n  // touch pan/zoom (basic)\n  let lastTouchDist=null;\n  stage.addEventListener(\"touchstart\",(e)=>{\n    if(e.touches.length===1 && !e.target.closest(\".node\")){ dragging=true; sx=e.touches[0].clientX; sy=e.touches[0].clientY; ox=state.panX; oy=state.panY; }\n  },{passive:true});\n  stage.addEventListener(\"touchmove\",(e)=>{\n    if(e.touches.length===2){\n      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);\n      if(lastTouchDist){ const r=stage.getBoundingClientRect(); const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-r.left, my=(e.touches[0].clientY+e.touches[1].clientY)/2-r.top; zoomAt(mx,my,d/lastTouchDist); }\n      lastTouchDist=d;\n    } else if(dragging && e.touches.length===1){\n      state.panX=ox+(e.touches[0].clientX-sx); state.panY=oy+(e.touches[0].clientY-sy); applyTransform();\n    }\n  },{passive:true});\n  stage.addEventListener(\"touchend\",()=>{ dragging=false; lastTouchDist=null; persist(); });\n\n  /* ===================== Persist ===================== */\n  let pt;\n  function persist(){\n    clearTimeout(pt);\n    pt=setTimeout(()=>{\n      try{ localStorage.setItem(SKEY, JSON.stringify({ orient:state.orient, collapsed:[...collapsed], zoom:state.zoom, panX:state.panX, panY:state.panY })); }catch(e){}\n    },180);\n  }\n\n  /* ===================== Wire buttons ===================== */\n  document.getElementById(\"btn-v\").addEventListener(\"click\",()=>setOrient(\"v\"));\n  document.getElementById(\"btn-h\").addEventListener(\"click\",()=>setOrient(\"h\"));\n  document.getElementById(\"btn-expand\").addEventListener(\"click\",expandAll);\n  document.getElementById(\"btn-collapse\").addEventListener(\"click\",collapseAllToLevel);\n  document.getElementById(\"btn-zin\").addEventListener(\"click\",()=>{const r=stage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1.15);});\n  document.getElementById(\"btn-zout\").addEventListener(\"click\",()=>{const r=stage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,0.87);});\n  document.getElementById(\"btn-fit\").addEventListener(\"click\",fit);\n  window.addEventListener(\"resize\",()=>{ /* keep current transform */ });\n\n  /* ===================== Init ===================== */\n  updateOrientBtns();\n  // fonts may shift metrics; render then fit after load\n  render(false);\n  const hadSaved = (state.panX || state.panY) && state.zoom;\n  if(hadSaved){ applyTransform(); } else { fit(); }\n  if(document.fonts && document.fonts.ready){\n    document.fonts.ready.then(()=>{ render(false); if(!hadSaved) fit(); else applyTransform(); });\n  }\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
